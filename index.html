<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6c5ce7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Monstres de Poche">
<title>Monstres de Poche</title>
<link id="manifest-link" rel="manifest">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c5ce7'/><text x='50' y='72' font-size='60' text-anchor='middle'>🌟</text></svg>">
<style>
:root{
  --primary:#6c5ce7;--primary-dark:#4834d4;--accent:#fdcb6e;--success:#00b894;
  --danger:#e17055;--info:#74b9ff;--bg:#fef9ff;--surface:#fff;--text:#2d3436;
  --muted:#95a5a6;--common:#74b9ff;--rare:#a29bfe;--epic:#fd79a8;
  --radius:20px;--shadow:0 4px 12px rgba(0,0,0,.1);--shadow-lg:0 8px 24px rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:18px;line-height:1.4;
  user-select:none;-webkit-user-select:none;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
.screen{display:none;min-height:100vh;min-height:100dvh;padding:16px;flex-direction:column}
.screen.active{display:flex}
.hidden{display:none!important}

#screen-home{background:linear-gradient(135deg,#fef9ff 0%,#e7e4ff 100%)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
.greeting{font-size:28px;font-weight:800;color:var(--primary-dark);margin:8px 0}
.stats-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.stat-pill{background:var(--surface);padding:8px 14px;border-radius:999px;
  box-shadow:var(--shadow);font-weight:700;font-size:15px}
.tasks-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;flex:1;align-content:start;padding-bottom:80px}
.task-btn{background:var(--surface);border-radius:var(--radius);padding:18px 10px;
  min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;box-shadow:var(--shadow);font-size:17px;font-weight:700;
  transition:transform .2s,opacity .3s;border:3px solid transparent}
.task-btn:active{transform:scale(.95)}
.task-btn.done{opacity:.55;background:#d4f5e1;border-color:var(--success)}
.task-emoji{font-size:56px;line-height:1}
.task-name{text-align:center;line-height:1.2}
.task-check{position:absolute;font-size:24px}

.btn-circle{width:56px;height:56px;border-radius:50%;background:var(--surface);
  display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow)}

#screen-timer{background:linear-gradient(135deg,#a29bfe 0%,#6c5ce7 100%);color:#fff;align-items:center}
.timer-header{width:100%;display:flex;justify-content:flex-start}
.timer-back{background:rgba(255,255,255,.2);color:#fff;padding:10px 16px;border-radius:999px;font-size:15px;font-weight:600}
.timer-title{font-size:26px;font-weight:800;text-align:center;margin:8px 0}
.timer-emoji{font-size:72px;text-align:center;margin:8px 0}
.timer-circle-wrap{position:relative;width:260px;height:260px;margin:12px auto;max-width:80vw;max-height:35vh}
.timer-circle-wrap svg{transform:rotate(-90deg);width:100%;height:100%;display:block}
.timer-circle-bg{fill:none;stroke:rgba(255,255,255,.2);stroke-width:14}
.timer-circle-fg{fill:none;stroke:#fff;stroke-width:14;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear,stroke .5s}
.timer-display{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:64px;font-weight:800;font-variant-numeric:tabular-nums}
.timer-controls{display:flex;gap:16px;justify-content:center;margin:16px 0}
.timer-adjust{background:rgba(255,255,255,.25);padding:12px 22px;border-radius:16px;
  font-size:22px;font-weight:800;color:#fff;min-width:80px;min-height:64px}
.timer-actions{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px}
.btn-big{background:var(--accent);color:var(--text);font-size:24px;font-weight:800;
  padding:18px 36px;border-radius:24px;box-shadow:var(--shadow-lg);min-height:72px;min-width:220px}
.btn-big:active{transform:scale(.96)}
.btn-finish{background:var(--success);color:#fff}

#screen-gallery{background:linear-gradient(135deg,#fdcb6e 0%,#fd79a8 100%);color:#fff;overflow-y:auto}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;padding-bottom:30px}
.monster-card{background:rgba(255,255,255,.95);color:var(--text);border-radius:14px;
  padding:10px 6px;text-align:center;min-height:120px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;box-shadow:var(--shadow)}
.monster-card.locked{background:rgba(0,0,0,.25);color:rgba(255,255,255,.85)}
.monster-emoji{font-size:40px;line-height:1}
.monster-name{font-size:12px;font-weight:700;line-height:1.1}
.monster-rarity{font-size:10px;padding:2px 8px;border-radius:8px;color:#fff;
  font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.rarity-common{background:var(--common)}
.rarity-rare{background:var(--rare)}
.rarity-epic{background:var(--epic)}

#screen-parent{background:#2c3e50;color:#ecf0f1;overflow-y:auto}
#screen-parent .header h2{margin:0;font-size:20px}
.p-section{background:#34495e;padding:14px;border-radius:12px;margin-bottom:12px}
.p-section h3{font-size:16px;margin-bottom:10px;color:#fdcb6e}
#screen-parent input,#screen-parent select,#screen-parent textarea{
  background:#2c3e50;color:#fff;border:1px solid #4a5d6e;padding:10px;
  border-radius:8px;font-size:15px;width:100%;font-family:inherit}
#screen-parent label{display:block;margin:8px 0 4px;font-size:13px;color:#bdc3c7}
.p-btn{background:var(--primary);color:#fff;padding:10px 14px;border-radius:8px;
  font-size:14px;font-weight:600;margin:4px 4px 4px 0;min-height:40px}
.p-btn.danger{background:var(--danger)}
.p-btn.success{background:var(--success)}
.p-btn.warn{background:#e67e22}
.task-row{display:flex;gap:6px;align-items:center;padding:8px;background:#2c3e50;
  border-radius:8px;margin-bottom:6px;flex-wrap:wrap}
.task-row .tr-emoji{width:50px;font-size:20px;text-align:center}
.task-row .tr-name{flex:2;min-width:120px}
.task-row .tr-dur{width:70px}
.task-row .tr-actions{display:flex;gap:4px}
.icon-btn{background:#4a5d6e;color:#fff;border-radius:6px;padding:6px 10px;font-size:16px;min-height:36px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:#2c3e50;padding:10px;border-radius:8px;text-align:center}
.stat-box .v{font-size:24px;font-weight:800;color:var(--accent)}
.stat-box .l{font-size:11px;color:#bdc3c7}

.lock-btn{position:fixed;bottom:14px;right:14px;width:48px;height:48px;border-radius:50%;
  background:rgba(0,0,0,.18);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:22px;z-index:100;backdrop-filter:blur(4px)}

.confetti-container{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:200}
.confetti{position:absolute;width:12px;height:14px;top:-20px;animation:confetti-fall linear forwards}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:.7}
}

.card-reveal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px}
.card-flip{width:240px;height:320px;perspective:1200px}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;
  animation:cardFlip 1.6s cubic-bezier(.5,0,.5,1) forwards}
@keyframes cardFlip{
  0%{transform:rotateY(0) scale(.4)}
  100%{transform:rotateY(900deg) scale(1)}
}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:var(--shadow-lg);padding:16px;text-align:center}
.card-back{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;font-size:90px}
.card-front{background:#fff;transform:rotateY(180deg);color:var(--text);gap:10px}
.card-front .ce{font-size:110px;line-height:1}
.card-front .cn{font-size:24px;font-weight:800}
.card-reveal-bg .closebtn{background:#fff;color:var(--text);padding:14px 28px;border-radius:16px;font-weight:800;font-size:18px}
.card-reveal-bg .title{color:#fff;font-size:22px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.5)}

.victory-overlay{position:fixed;inset:0;z-index:400;
  background:radial-gradient(circle at center,#ffeaa7,#fdcb6e 40%,#e17055);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  color:#fff;text-align:center;padding:20px;overflow:hidden}
.victory-overlay h1{font-size:44px;font-weight:900;text-shadow:0 4px 12px rgba(0,0,0,.4);
  animation:bounce .6s ease infinite alternate}
.victory-overlay p{font-size:22px;margin-top:14px;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.3)}
.victory-overlay .closebtn{background:#fff;color:var(--text);padding:14px 28px;border-radius:16px;
  font-weight:800;font-size:18px;margin-top:24px}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.firework{position:absolute;width:8px;height:8px;border-radius:50%;
  animation:firework 1.5s ease-out forwards}
@keyframes firework{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;color:var(--text);border-radius:20px;padding:24px;max-width:380px;width:100%}
.modal h3{margin-bottom:12px;font-size:22px}
.modal input{width:100%;padding:14px;border:2px solid #ddd;border-radius:12px;
  font-size:22px;margin:12px 0;text-align:center;font-family:inherit}
.modal-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.modal-buttons button{padding:12px 18px;border-radius:10px;font-weight:700;min-height:44px}
.modal-cancel{background:#ecf0f1;color:var(--text)}
.modal-ok{background:var(--primary);color:#fff}
.modal-error{color:var(--danger);font-size:14px;margin-top:6px;min-height:18px}

@media(max-width:340px){
  .tasks-grid{grid-template-columns:1fr}
  .gallery-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<section id="screen-home" class="screen active">
  <div class="header">
    <div></div>
    <button id="btn-gallery" class="btn-circle" aria-label="Voir la galerie">🏆</button>
  </div>
  <h1 class="greeting" id="greeting">Mission du jour ! 🚀</h1>
  <div class="stats-row">
    <div class="stat-pill" id="stat-tasks">⏳ — restantes</div>
    <div class="stat-pill" id="stat-monsters">👾 0 / 20</div>
    <div class="stat-pill" id="stat-points">⭐ 0 pts</div>
  </div>
  <div class="tasks-grid" id="tasks-grid"></div>
</section>

<section id="screen-timer" class="screen">
  <div class="timer-header">
    <button class="timer-back" id="timer-back" aria-label="Retour à l'accueil">← Retour</button>
  </div>
  <div class="timer-emoji" id="timer-emoji">🦷</div>
  <div class="timer-title" id="timer-title">Tâche</div>
  <div class="timer-circle-wrap">
    <svg viewBox="0 0 200 200">
      <circle class="timer-circle-bg" cx="100" cy="100" r="90"/>
      <circle class="timer-circle-fg" id="timer-fg" cx="100" cy="100" r="90"/>
    </svg>
    <div class="timer-display" id="timer-display">2:00</div>
  </div>
  <div class="timer-controls">
    <button class="timer-adjust" id="timer-minus" aria-label="Enlever 1 minute">−1</button>
    <button class="timer-adjust" id="timer-plus" aria-label="Ajouter 1 minute">+1</button>
  </div>
  <div class="timer-actions">
    <button class="btn-big" id="timer-go">GO ! 🚀</button>
    <button class="btn-big btn-finish hidden" id="timer-finish">J'ai fini ! ✨</button>
  </div>
</section>

<section id="screen-gallery" class="screen">
  <div class="header">
    <button class="timer-back" id="gallery-back" aria-label="Retour">← Retour</button>
    <div></div>
  </div>
  <h2 style="font-size:28px;font-weight:800;text-align:center;margin:8px 0">Ma Collection 🏆</h2>
  <p id="gallery-counter" style="text-align:center;font-size:18px;font-weight:700">0 / 20 monstres</p>
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<section id="screen-parent" class="screen">
  <div class="header">
    <button class="timer-back" id="parent-back" style="background:rgba(255,255,255,.12)" aria-label="Retour">← Retour</button>
    <h2>🔧 Zone Parent</h2>
  </div>
  <div id="parent-content"></div>
</section>

<button class="lock-btn" id="lock-btn" aria-label="Accéder à la zone parent (appui long)">🔒</button>

<script>
'use strict';

/* ==================== CONSTANTES ==================== */
const APP_VERSION = 1;
const STORAGE_KEY = 'monstresDePoche';

const DEFAULT_TASKS = [
  {id:1,emoji:"🦷",name:"Brosser les dents",duration:2,active:true},
  {id:2,emoji:"👕",name:"S'habiller",duration:5,active:true},
  {id:3,emoji:"🍎",name:"Petit-déjeuner",duration:15,active:true},
  {id:4,emoji:"🧸",name:"Ranger la chambre",duration:10,active:true},
  {id:5,emoji:"🛏️",name:"Faire le lit",duration:3,active:true}
];

const BESTIARY = [
  {id:'c1',emoji:'👾',name:'Pixou',rarity:'common'},
  {id:'c2',emoji:'🐛',name:'Vermichou',rarity:'common'},
  {id:'c3',emoji:'🦎',name:'Lizzou',rarity:'common'},
  {id:'c4',emoji:'🐸',name:'Coâcoâ',rarity:'common'},
  {id:'c5',emoji:'🦔',name:'Picpic',rarity:'common'},
  {id:'c6',emoji:'🐭',name:'Trotti',rarity:'common'},
  {id:'c7',emoji:'🐹',name:'Joufflou',rarity:'common'},
  {id:'c8',emoji:'🐰',name:'Saltou',rarity:'common'},
  {id:'c9',emoji:'🐱',name:'Miaouille',rarity:'common'},
  {id:'c10',emoji:'🐶',name:'Wafou',rarity:'common'},
  {id:'c11',emoji:'🦊',name:'Rouxto',rarity:'common'},
  {id:'c12',emoji:'🐻',name:'Calinours',rarity:'common'},
  {id:'c13',emoji:'🐨',name:'Doumou',rarity:'common'},
  {id:'c14',emoji:'🐼',name:'Bambouille',rarity:'common'},
  {id:'r1',emoji:'🦁',name:'Rugiroi',rarity:'rare'},
  {id:'r2',emoji:'🐯',name:'Stripius',rarity:'rare'},
  {id:'r3',emoji:'🦄',name:'Licornia',rarity:'rare'},
  {id:'r4',emoji:'🐲',name:'Flammito',rarity:'rare'},
  {id:'r5',emoji:'🦅',name:'Aigleon',rarity:'rare'},
  {id:'e1',emoji:'🐉',name:'Dragor Suprême',rarity:'epic'}
];

const RARITY_LABEL = {common:'Commun',rare:'Rare',epic:'Épique'};
const EMOJI_CHOICES = ['🦷','👕','🍎','🧸','🛏️','📚','✏️','🚿','🥣','🦶','🪥','🧦','🎒','🧹','🚰','🎨','⚽','🎵','💧','🍽️'];

/* ==================== ÉTAT ==================== */
let state = null;
let currentTaskId = null;
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerRunning = false;
let wakeLock = null;
let parentChallenge = null;
let perfectShownToday = false;

/**
 * Construit l'état par défaut (premier lancement)
 * @returns {object}
 */
function defaultState(){
  return {
    appVersion: APP_VERSION,
    childName: '',
    tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)),
    completedToday: [],
    lastAccessDate: new Date().toDateString(),
    monsters: [],
    points: 0,
    stats: {totalCompleted:0,perfectDays:0,history:[]},
    settings: {perfectQuota:100,monsterDropRate:25}
  };
}

/** Migration ascendante du schéma */
function migrate(old){
  const fresh = defaultState();
  const merged = Object.assign({}, fresh, old);
  merged.settings = Object.assign({}, fresh.settings, old.settings || {});
  merged.stats = Object.assign({}, fresh.stats, old.stats || {});
  merged.appVersion = APP_VERSION;
  return merged;
}

/** Charge l'état depuis localStorage */
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      return s.appVersion === APP_VERSION ? s : migrate(s);
    }
  }catch(e){}
  return defaultState();
}

/** Sauvegarde l'état */
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

/** Reset automatique des tâches du jour si nouveau jour */
function checkDailyReset(){
  const today = new Date().toDateString();
  if(state.lastAccessDate !== today){
    if(state.completedToday.length > 0){
      state.stats.history.push({date: state.lastAccessDate, count: state.completedToday.length});
      if(state.stats.history.length > 60) state.stats.history.shift();
    }
    state.completedToday = [];
    state.lastAccessDate = today;
    perfectShownToday = false;
    saveState();
  }
}

/* ==================== AUDIO ==================== */
let audioCtx = null;
function getAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }catch(e){ return null; }
}

/**
 * Joue une note synthétisée
 */
function playTone(freq, duration, type='sine', vol=0.18){
  try{
    const ctx = getAudio(); if(!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(g).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + duration);
  }catch(e){}
}

function soundClick(){ playTone(620, 0.07, 'square', 0.12); }
function soundValid(){
  playTone(523, 0.13);
  setTimeout(()=>playTone(659, 0.13), 110);
  setTimeout(()=>playTone(784, 0.22), 220);
}
function soundVictory(){
  const notes = [523,659,784,1047,784,1047,1319];
  notes.forEach((n,i)=>setTimeout(()=>playTone(n, 0.22, 'sine', 0.2), i*140));
}
function soundUnlock(){
  playTone(440, 0.1);
  setTimeout(()=>playTone(660, 0.1), 90);
  setTimeout(()=>playTone(880, 0.3), 180);
}
function soundError(){ playTone(220, 0.2, 'sawtooth', 0.1); }

/* ==================== HAPTIC ==================== */
function vibrate(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}

/* ==================== WAKE LOCK ==================== */
async function acquireWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
function releaseWakeLock(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock = null; } }catch(e){}
}

/* ==================== NAVIGATION ==================== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if(el) el.classList.add('active');
  window.scrollTo(0,0);
}

/* ==================== RENDU ACCUEIL ==================== */
function activeTasks(){ return state.tasks.filter(t => t.active); }

function renderHome(){
  const name = state.childName || 'Champion';
  document.getElementById('greeting').textContent = `Mission du jour pour ${name} ! 🚀`;
  const active = activeTasks();
  const remaining = active.filter(t => !state.completedToday.includes(t.id)).length;
  document.getElementById('stat-tasks').textContent = `⏳ ${remaining} restante${remaining>1?'s':''}`;
  document.getElementById('stat-monsters').textContent = `👾 ${state.monsters.length} / ${BESTIARY.length}`;
  document.getElementById('stat-points').textContent = `⭐ ${state.points} pts`;
  
  const grid = document.getElementById('tasks-grid');
  grid.innerHTML = '';
  active.forEach(t => {
    const done = state.completedToday.includes(t.id);
    const btn = document.createElement('button');
    btn.className = 'task-btn' + (done ? ' done' : '');
    btn.setAttribute('aria-label', `${t.name}${done?' (validée)':''}`);
    btn.innerHTML = `
      <div class="task-emoji">${t.emoji}</div>
      <div class="task-name">${escapeHtml(t.name)}</div>
      <div class="task-status">${done ? '✅ Bravo !' : t.duration + ' min'}</div>
    `;
    btn.addEventListener('click', () => {
      soundClick(); vibrate(20);
      if(done){ return; }
      openTimer(t.id);
    });
    grid.appendChild(btn);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ==================== MINUTEUR ==================== */
function openTimer(taskId){
  currentTaskId = taskId;
  const task = state.tasks.find(t => t.id === taskId);
  if(!task) return;
  document.getElementById('timer-emoji').textContent = task.emoji;
  document.getElementById('timer-title').textContent = task.name;
  timerTotal = task.duration * 60;
  timerRemaining = timerTotal;
  timerRunning = false;
  updateTimerDisplay();
  document.getElementById('timer-go').classList.remove('hidden');
  document.getElementById('timer-finish').classList.add('hidden');
  showScreen('screen-timer');
}

function updateTimerDisplay(){
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timer-display').textContent = `${m}:${String(s).padStart(2,'0')}`;
  const circle = document.getElementById('timer-fg');
  const R = 90, C = 2 * Math.PI * R;
  circle.setAttribute('stroke-dasharray', C);
  const ratio = timerTotal > 0 ? timerRemaining / timerTotal : 0;
  circle.setAttribute('stroke-dashoffset', C * (1 - ratio));
  let color = '#fff';
  if(timerRunning){
    if(timerRemaining <= 60) color = '#e74c3c';
    else if(ratio < 0.5) color = '#fdcb6e';
    else color = '#2ecc71';
  }
  circle.style.stroke = color;
}

function adjustTimer(delta){
  if(timerRunning) return;
  const newSec = Math.max(60, Math.min(30*60, timerTotal + delta*60));
  timerTotal = newSec;
  timerRemaining = newSec;
  updateTimerDisplay();
  soundClick(); vibrate(15);
}

function startTimer(){
  if(timerRunning) return;
  timerRunning = true;
  acquireWakeLock();
  soundClick(); vibrate(30);
  document.getElementById('timer-go').classList.add('hidden');
  document.getElementById('timer-finish').classList.remove('hidden');
  timerInterval = setInterval(() => {
    timerRemaining--;
    if(timerRemaining <= 0){
      timerRemaining = 0;
      stopTimer();
      vibrate([200,100,200]);
      playTone(880, 0.4);
      updateTimerDisplay();
      return;
    }
    if(timerRemaining === 60) vibrate(50);
    updateTimerDisplay();
  }, 1000);
}

function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  timerRunning = false;
  releaseWakeLock();
}

function exitTimer(){
  stopTimer();
  showScreen('screen-home');
}

function finishTask(){
  stopTimer();
  const taskId = currentTaskId;
  if(taskId == null) return;
  if(!state.completedToday.includes(taskId)){
    state.completedToday.push(taskId);
    state.stats.totalCompleted++;
    state.points += 10;
  }
  vibrate([100,50,100,50,200]);
  soundValid();
  showConfetti();
  
  const reward = drawReward();
  saveState();
  
  setTimeout(() => {
    if(reward){
      showMonsterReveal(reward);
    } else {
      checkPerfectDay();
      showScreen('screen-home');
      renderHome();
    }
  }, 1400);
}

/* ==================== RÉCOMPENSES ==================== */
/**
 * Tire une récompense potentielle
 * @returns {object|null} monstre débloqué ou null
 */
function drawReward(){
  const rate = state.settings.monsterDropRate / 100;
  if(Math.random() >= rate) return null;
  
  const rarityRoll = Math.random();
  let targetRarity;
  if(rarityRoll < 0.70) targetRarity = 'common';
  else if(rarityRoll < 0.95) targetRarity = 'rare';
  else targetRarity = 'epic';
  
  let candidate = pickUncollected(targetRarity);
  if(!candidate && targetRarity === 'epic') candidate = pickUncollected('rare');
  if(!candidate) candidate = pickUncollected('common');
  if(!candidate){
    state.points += 20;
    return null;
  }
  state.monsters.push(candidate.id);
  return candidate;
}

function pickUncollected(rarity){
  const pool = BESTIARY.filter(m => m.rarity === rarity && !state.monsters.includes(m.id));
  if(pool.length === 0) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function checkPerfectDay(){
  const active = activeTasks();
  if(active.length === 0) return;
  const done = active.filter(t => state.completedToday.includes(t.id)).length;
  const pct = (done / active.length) * 100;
  if(pct >= state.settings.perfectQuota && !perfectShownToday){
    perfectShownToday = true;
    const today = new Date().toDateString();
    if(!state.stats.history.some(h => h.date === today && h.perfect)){
      state.stats.perfectDays++;
      state.stats.history.push({date: today, perfect: true, count: done});
    }
    saveState();
    setTimeout(showUltimateReward, 300);
  }
}

function getParentLockInfo(){
  const until = parseInt(sessionStorage.getItem('parentLockUntil') || '0', 10);
  const fails = parseInt(sessionStorage.getItem('parentFails') || '0', 10);
  return {until, fails, locked: Date.now() < until};
}

function generateChallenge(){
  const a = 6 + Math.floor(Math.random() * 7);
  const b = 6 + Math.floor(Math.random() * 7);
  const c = 10 + Math.floor(Math.random() * 41);
  return {a, b, c, answer: a * b + c};
}

function requestParentAccess(){
  const info = getParentLockInfo();
  if(info.locked){
    const secs = Math.ceil((info.until - Date.now()) / 1000);
    showModal({title:'⛔ Bloqué', message:`Trop d'erreurs.<br/>Réessayez dans ${secs}s.`, inputType:null});
    return;
  }
  parentChallenge = generateChallenge();
  showMathModal();
}

function showMathModal(){
  const ch = parentChallenge;
  showModal({
    title: '🔐 Zone Parent',
    message: `Pour entrer, calcule :<br/><b style="font-size:28px">(${ch.a} × ${ch.b}) + ${ch.c} = ?</b>`,
    inputType: 'number',
    onValidate: (val) => {
      const n = parseInt(val, 10);
      if(n === ch.answer){
        sessionStorage.setItem('parentFails','0');
        openParentZone();
        return true;
      } else {
        const info = getParentLockInfo();
        const f = info.fails + 1;
        sessionStorage.setItem('parentFails', String(f));
        if(f >= 3){
          sessionStorage.setItem('parentLockUntil', String(Date.now() + 60000));
          sessionStorage.setItem('parentFails','0');
          return 'Bloqué 60 secondes';
        }
        soundError();
        return `Faux ! (${3-f} essai${3-f>1?'s':''} restant${3-f>1?'s':''})`;
      }
    }
  });
}

/* ==================== MODALE GÉNÉRIQUE ==================== */
function showModal({title, message, inputType, defaultValue='', onValidate, okText='Valider', cancelText='Annuler'}){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  const inputHtml = inputType ? `<input type="${inputType}" id="modal-input" value="${escapeHtml(defaultValue)}" autofocus inputmode="${inputType==='number'?'numeric':'text'}"/>` : '';
  bg.innerHTML = `
    <div class="modal">
      <h3>${title}</h3>
      <div>${message || ''}</div>
      ${inputHtml}
      <div class="modal-error" id="modal-error"></div>
      <div class="modal-buttons">
        <button class="modal-cancel">${cancelText}</button>
        <button class="modal-ok">${okText}</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  const input = bg.querySelector('#modal-input');
  const errEl = bg.querySelector('#modal-error');
  if(input) setTimeout(() => input.focus(), 50);
  
  const close = () => bg.remove();
  bg.querySelector('.modal-cancel').addEventListener('click', () => { soundClick(); close(); });
  
  const tryValidate = () => {
    soundClick();
    const val = input ? input.value : null;
    if(onValidate){
      const r = onValidate(val);
      if(r === true) close();
      else if(typeof r === 'string') errEl.innerHTML = r;
    } else close();
  };
  bg.querySelector('.modal-ok').addEventListener('click', tryValidate);
  if(input) input.addEventListener('keydown', e => { if(e.key === 'Enter') tryValidate(); });
  return bg;
}

  return state.stats.history.filter(h => {

  });
  
  list.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', e => {
      const id = parseInt(e.target.dataset.id, 10);
      const field = e.target.dataset.field;
      const t = state.tasks.find(x => x.id === id);
      if(!t) return;
      let v = e.target.value;
      if(field === 'duration'){
        v = Math.max(1, Math.min(30, parseInt(v,10) || 1));
        e.target.value = v;
      }
      t[field] = v;
      saveState();
    });
  });
  
  list.querySelectorAll('.icon-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id, 10);
      const act = btn.dataset.act;
      handleTaskAction(id, act);
    });
  });
}

function handleTaskAction(id, action){
  const idx = state.tasks.findIndex(t => t.id === id);
  if(idx < 0) return;
  if(action === 'up' && idx > 0){
    [state.tasks[idx-1], state.tasks[idx]] = [state.tasks[idx], state.tasks[idx-1]];
  } else if(action === 'down' && idx < state.tasks.length-1){
    [state.tasks[idx+1], state.tasks[idx]] = [state.tasks[idx], state.tasks[idx+1]];
  } else if(action === 'toggle'){
    state.tasks[idx].active = !state.tasks[idx].active;
  } else if(action === 'delete'){
    if(!confirm('Supprimer cette tâche ?')) return;
    state.tasks.splice(idx, 1);
  }
  saveState();
  renderParentTasks();
}

function exportConfig(){
  try{
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'monstres-de-poche-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }catch(e){ alert('Export impossible'); }
}

function importConfig(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json,.json';
  inp.addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const data = JSON.parse(ev.target.result);
        if(!data || typeof data !== 'object') throw new Error('Format invalide');
        state = migrate(data);
        saveState();
        renderParent();
        alert('✅ Import réussi !');
      }catch(err){ alert('❌ Fichier invalide : ' + err.message); }
    };
    reader.readAsText(file);
  });
  inp.click();
}

    if(lockPressTimer){ clearTimeout(lockPressTimer); lockPressTimer = null; }
  };
  btn.addEventListener('touchstart', start, {passive:false});
  btn.addEventListener('touchend', cancel);
  btn.addEventListener('touchcancel', cancel);
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', cancel);
  btn.addEventListener('mouseleave', cancel);
}

/* ==================== PROMPT PRÉNOM PREMIER LANCEMENT ==================== */
function askNameIfNeeded(){
  if(state.childName) return;
  showModal({
    title: '👋 Bienvenue !',
    message: 'Comment t\'appelles-tu, jeune aventurier ?',
    inputType: 'text',
    defaultValue: '',
    okText: 'C\'est parti ! 🚀',
    cancelText: 'Plus tard',
    onValidate: val => {
      const n = (val || '').trim().slice(0, 20);
      if(!n) return 'Donne ton prénom 😊';
      state.childName = n;
      saveState();
      renderHome();
      return true;
    }
  });
}

/* ==================== PWA : MANIFEST & SERVICE WORKER ==================== */
function setupPWA(){
  try{
    const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#6c5ce7"/><text x="50" y="72" font-size="60" text-anchor="middle">🌟</text></svg>`;
    const iconData = 'data:image/svg+xml;base64,' + btoa(iconSvg);
    const manifest = {
      name: 'Monstres de Poche',
      short_name: 'Monstres',
      start_url: '.',
      display: 'standalone',
      orientation: 'portrait',
      theme_color: '#6c5ce7',
      background_color: '#fef9ff',
      icons: [
        {src: iconData, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable'},
        {src: iconData, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable'}
      ]
    };
    const manifestUrl = 'data:application/json;base64,' + btoa(unescape(encodeURIComponent(JSON.stringify(manifest))));
    document.getElementById('manifest-link').href = manifestUrl;
  }catch(e){}
  
  try{
    if('serviceWorker' in navigator){
      const swCode = `
        const CACHE = 'mdp-v1';
        self.addEventListener('install', e => { self.skipWaiting(); });
        self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
        self.addEventListener('fetch', e => {
          if(e.request.method !== 'GET') return;
          e.respondWith(
            caches.open(CACHE).then(cache =>
              cache.match(e.request).then(hit => {
                const fetchPromise = fetch(e.request).then(resp => {
                  if(resp && resp.status === 200) cache.put(e.request, resp.clone());
                  return resp;
                }).catch(() => hit);
                return hit || fetchPromise;
              })
            )
          );
        });
      `;
      const blob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    }
  }catch(e){}
}

/* ==================== ÉVÉNEMENTS GLOBAUX ==================== */
function bindGlobalEvents(){
  document.getElementById('btn-gallery').addEventListener('click', () => {
    soundClick(); vibrate(20);
    renderGallery();
    showScreen('screen-gallery');
  });
  document.getElementById('gallery-back').addEventListener('click', () => {
    soundClick(); showScreen('screen-home');
  });
  document.getElementById('parent-back').addEventListener('click', () => {
    soundClick(); showScreen('screen-home'); renderHome();
  });
  document.getElementById('timer-back').addEventListener('click', () => {
    soundClick(); exitTimer();
  });
  document.getElementById('timer-minus').addEventListener('click', () => adjustTimer(-1));
  document.getElementById('timer-plus').addEventListener('click', () => adjustTimer(1));
  document.getElementById('timer-go').addEventListener('click', startTimer);
  document.getElementById('timer-finish').addEventListener('click', finishTask);
  
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible'){
      checkDailyReset();
      if(document.getElementById('screen-home').classList.contains('active')) renderHome();
      if(timerRunning && !wakeLock) acquireWakeLock();
    }
  });
  
  window.addEventListener('beforeunload', () => { releaseWakeLock(); });
}

/* ==================== INIT ==================== */
function init(){
  state = loadState();
  checkDailyReset();
  setupPWA();
  bindGlobalEvents();
  setupLockButton();
  renderHome();
  askNameIfNeeded();
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
